<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>금융상품 가이드 — 차의과학대학교 경영학전공</title>
<meta name="description" content="72개 금융상품 분석 · AI 상담 · 차의과학대학교 경영학전공">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/livekit-client/dist/livekit-client.umd.min.js"></script>
<style>
*, *::before, *::after { margin:0; padding:0; box-sizing:border-box; }

:root {
  --bg: #fafafa;
  --bg-sidebar: #141414;
  --bg-card: #ffffff;
  --bg-chat: #f5f5f5;
  --text: #1a1a1a;
  --text-secondary: #666;
  --text-sidebar: #a0a0a0;
  --text-sidebar-active: #fff;
  --border: #e5e5e5;
  --accent: #1a1a1a;
  --accent-light: #f0f0f0;
  --radius: 8px;
  --sidebar-w: 260px;
  --chat-w: 380px;
  --transition: 0.2s ease;
}

html { font-size: 15px; }
body {
  font-family: 'Noto Sans KR', -apple-system, sans-serif;
  background: var(--bg);
  color: var(--text);
  line-height: 1.7;
  height: 100vh;
  overflow: hidden;
}

/* ─── LAYOUT ─── */
.layout {
  display: flex;
  height: 100vh;
}

/* ─── SIDEBAR ─── */
.sidebar {
  width: var(--sidebar-w);
  background: var(--bg-sidebar);
  color: var(--text-sidebar);
  display: flex;
  flex-direction: column;
  flex-shrink: 0;
  overflow-y: auto;
  border-right: 1px solid #222;
}

.sidebar-header {
  padding: 24px 20px 16px;
  border-bottom: 1px solid #222;
}
.sidebar-header h1 {
  font-size: 14px;
  font-weight: 600;
  color: #fff;
  letter-spacing: -0.3px;
}
.sidebar-header p {
  font-size: 11px;
  color: #666;
  margin-top: 4px;
}

.sidebar-section {
  padding: 12px 0;
}
.sidebar-section-title {
  font-size: 10px;
  font-weight: 600;
  text-transform: uppercase;
  letter-spacing: 1px;
  color: #555;
  padding: 4px 20px 8px;
}

.sidebar-item {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 8px 20px;
  cursor: pointer;
  font-size: 13px;
  transition: background var(--transition), color var(--transition);
  border-left: 2px solid transparent;
}
.sidebar-item:hover {
  background: #1e1e1e;
  color: #ccc;
}
.sidebar-item.active {
  background: #1e1e1e;
  color: var(--text-sidebar-active);
  border-left-color: #fff;
}
.sidebar-item .item-icon {
  font-size: 14px;
  width: 20px;
  text-align: center;
  flex-shrink: 0;
}
.sidebar-item .item-count {
  margin-left: auto;
  font-size: 11px;
  color: #555;
  font-family: 'JetBrains Mono', monospace;
}

.sidebar-footer {
  margin-top: auto;
  padding: 16px 20px;
  border-top: 1px solid #222;
}

/* ─── MODE TABS ─── */
.mode-tabs {
  display: flex;
  gap: 4px;
}
.mode-tab {
  flex: 1;
  padding: 8px 0;
  text-align: center;
  font-size: 11px;
  font-weight: 500;
  background: transparent;
  color: #666;
  border: 1px solid #333;
  border-radius: 6px;
  cursor: pointer;
  transition: all var(--transition);
}
.mode-tab:hover { border-color: #555; color: #999; }
.mode-tab.active {
  background: #fff;
  color: #000;
  border-color: #fff;
}
.mode-tab-icon { font-size: 14px; display: block; margin-bottom: 2px; }

/* ─── MAIN CONTENT ─── */
.main {
  flex: 1;
  overflow-y: auto;
  padding: 40px 48px;
  min-width: 0;
}

.content-header {
  margin-bottom: 32px;
  padding-bottom: 24px;
  border-bottom: 1px solid var(--border);
}
.content-header .cat-label {
  font-size: 11px;
  font-weight: 600;
  text-transform: uppercase;
  letter-spacing: 1px;
  color: var(--text-secondary);
  margin-bottom: 8px;
}
.content-header h2 {
  font-size: 28px;
  font-weight: 700;
  letter-spacing: -0.5px;
  line-height: 1.3;
}
.content-header .cat-desc {
  font-size: 14px;
  color: var(--text-secondary);
  margin-top: 8px;
}

/* Product cards grid */
.products-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
  gap: 12px;
  margin-bottom: 32px;
}
.product-chip {
  padding: 12px 16px;
  background: var(--bg-card);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  font-size: 13px;
  font-weight: 500;
  cursor: pointer;
  transition: all var(--transition);
  display: flex;
  align-items: center;
  gap: 8px;
}
.product-chip:hover { border-color: #999; }
.product-chip.active { border-color: var(--accent); background: var(--accent-light); }
.product-chip .chip-num {
  font-family: 'JetBrains Mono', monospace;
  font-size: 11px;
  color: var(--text-secondary);
}

/* Analysis sections */
.analysis-section {
  margin-bottom: 24px;
}
.analysis-title {
  font-size: 13px;
  font-weight: 600;
  margin-bottom: 8px;
  display: flex;
  align-items: center;
  gap: 8px;
}
.analysis-title .num {
  font-family: 'JetBrains Mono', monospace;
  font-size: 11px;
  color: var(--text-secondary);
  background: var(--accent-light);
  padding: 2px 6px;
  border-radius: 4px;
}
.analysis-content {
  font-size: 14px;
  color: #333;
  line-height: 1.8;
  padding-left: 36px;
}

.empty-state {
  text-align: center;
  padding: 80px 40px;
  color: var(--text-secondary);
}
.empty-state .empty-icon { font-size: 48px; margin-bottom: 16px; opacity: 0.3; }
.empty-state h3 { font-size: 18px; font-weight: 500; margin-bottom: 8px; color: var(--text); }
.empty-state p { font-size: 13px; }

/* ─── CHAT PANEL ─── */
.chat-panel {
  width: var(--chat-w);
  background: var(--bg-card);
  border-left: 1px solid var(--border);
  display: flex;
  flex-direction: column;
  flex-shrink: 0;
}

.chat-header {
  padding: 16px 20px;
  border-bottom: 1px solid var(--border);
  display: flex;
  align-items: center;
  justify-content: space-between;
}
.chat-header h3 {
  font-size: 14px;
  font-weight: 600;
}
.chat-status {
  font-size: 11px;
  color: var(--text-secondary);
  display: flex;
  align-items: center;
  gap: 4px;
}
.chat-status .dot {
  width: 6px; height: 6px;
  border-radius: 50%;
  background: #ccc;
}
.chat-status .dot.online { background: #22c55e; }

.chat-messages {
  flex: 1;
  overflow-y: auto;
  padding: 16px 20px;
  display: flex;
  flex-direction: column;
  gap: 12px;
}

.msg {
  max-width: 85%;
  padding: 10px 14px;
  border-radius: 12px;
  font-size: 13px;
  line-height: 1.6;
  word-break: break-word;
}
.msg.bot {
  background: var(--bg-chat);
  align-self: flex-start;
  border-bottom-left-radius: 4px;
}
.msg.user {
  background: var(--accent);
  color: #fff;
  align-self: flex-end;
  border-bottom-right-radius: 4px;
}
.msg .typing-dots {
  display: inline-flex; gap: 4px;
}
.msg .typing-dots span {
  width: 5px; height: 5px;
  background: #999;
  border-radius: 50%;
  animation: dot-pulse 1.2s infinite;
}
.msg .typing-dots span:nth-child(2) { animation-delay: 0.2s; }
.msg .typing-dots span:nth-child(3) { animation-delay: 0.4s; }
@keyframes dot-pulse {
  0%, 80%, 100% { opacity: 0.3; transform: scale(0.8); }
  40% { opacity: 1; transform: scale(1); }
}

.chat-input-area {
  padding: 16px 20px;
  border-top: 1px solid var(--border);
}
.chat-input-wrap {
  display: flex;
  gap: 8px;
  align-items: flex-end;
}
.chat-input {
  flex: 1;
  padding: 10px 14px;
  border: 1px solid var(--border);
  border-radius: var(--radius);
  font-size: 13px;
  font-family: inherit;
  resize: none;
  outline: none;
  line-height: 1.5;
  max-height: 120px;
  transition: border-color var(--transition);
}
.chat-input:focus { border-color: #999; }
.chat-send {
  padding: 10px 16px;
  background: var(--accent);
  color: #fff;
  border: none;
  border-radius: var(--radius);
  font-size: 13px;
  font-weight: 500;
  cursor: pointer;
  white-space: nowrap;
  transition: opacity var(--transition);
}
.chat-send:hover { opacity: 0.8; }
.chat-send:disabled { opacity: 0.4; cursor: default; }

/* ─── STS MODE ─── */
.sts-container {
  display: none;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  flex: 1;
  padding: 40px 20px;
  text-align: center;
  gap: 24px;
}
.sts-container.active { display: flex; }

.sts-visualizer {
  width: 120px; height: 120px;
  border-radius: 50%;
  border: 2px solid var(--border);
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 40px;
  transition: all 0.3s;
}
.sts-visualizer.listening { border-color: #22c55e; box-shadow: 0 0 0 8px rgba(34,197,94,0.1); }
.sts-visualizer.speaking { border-color: var(--accent); box-shadow: 0 0 0 8px rgba(0,0,0,0.05); }

.sts-status { font-size: 14px; font-weight: 500; }
.sts-transcript {
  font-size: 13px;
  color: var(--text-secondary);
  max-width: 300px;
  min-height: 40px;
}

.sts-btn {
  padding: 12px 32px;
  border: 1px solid var(--border);
  background: var(--bg-card);
  border-radius: var(--radius);
  font-size: 13px;
  font-weight: 500;
  cursor: pointer;
  transition: all var(--transition);
}
.sts-btn:hover { border-color: #999; }
.sts-btn.active { background: var(--accent); color: #fff; border-color: var(--accent); }
.sts-btn.stop { background: #ef4444; color: #fff; border-color: #ef4444; }

/* ─── FTF MODE ─── */
.ftf-container {
  display: none;
  flex-direction: column;
  flex: 1;
  padding: 20px;
  gap: 16px;
}
.ftf-container.active { display: flex; }

.ftf-video-wrap {
  flex: 1;
  background: #000;
  border-radius: var(--radius);
  overflow: hidden;
  position: relative;
  min-height: 300px;
  display: flex;
  align-items: center;
  justify-content: center;
}
.ftf-video-wrap video {
  width: 100%;
  height: 100%;
  object-fit: cover;
}
.ftf-placeholder {
  color: #555;
  text-align: center;
  font-size: 13px;
}
.ftf-placeholder .icon { font-size: 48px; margin-bottom: 8px; opacity: 0.5; }

.ftf-status {
  text-align: center;
  font-size: 13px;
  font-weight: 500;
  color: var(--text-secondary);
}

.ftf-controls {
  display: flex;
  gap: 8px;
  justify-content: center;
}

/* ─── MOBILE ─── */
.mobile-header {
  display: none;
  padding: 12px 16px;
  background: var(--bg-sidebar);
  color: #fff;
  align-items: center;
  gap: 12px;
}
.hamburger {
  background: none; border: none; color: #fff;
  font-size: 20px; cursor: pointer;
}
.chat-toggle-btn {
  display: none;
  position: fixed;
  bottom: 20px; right: 20px;
  width: 48px; height: 48px;
  border-radius: 50%;
  background: var(--accent);
  color: #fff;
  border: none;
  font-size: 20px;
  cursor: pointer;
  box-shadow: 0 2px 12px rgba(0,0,0,0.2);
  z-index: 100;
}

@media (max-width: 1024px) {
  .chat-panel { display: none; position: fixed; top: 0; right: 0; bottom: 0; width: 100%; max-width: 400px; z-index: 200; box-shadow: -4px 0 20px rgba(0,0,0,0.1); }
  .chat-panel.open { display: flex; }
  .chat-toggle-btn { display: flex; align-items: center; justify-content: center; }
}
@media (max-width: 768px) {
  .mobile-header { display: flex; }
  .sidebar { position: fixed; top: 0; left: 0; bottom: 0; z-index: 300; transform: translateX(-100%); transition: transform 0.3s; }
  .sidebar.open { transform: translateX(0); }
  .main { padding: 24px 20px; }
  .products-grid { grid-template-columns: 1fr; }
  :root { --sidebar-w: 280px; }
}
.sidebar-overlay {
  display: none;
  position: fixed; inset: 0;
  background: rgba(0,0,0,0.4);
  z-index: 299;
}
.sidebar-overlay.open { display: block; }
</style>
</head>
<body>

<!-- Mobile header -->
<div class="mobile-header">
  <button class="hamburger" onclick="toggleSidebar()">&#9776;</button>
  <span style="font-size:14px;font-weight:600">금융상품 가이드</span>
</div>
<div class="sidebar-overlay" id="sidebarOverlay" onclick="toggleSidebar()"></div>

<div class="layout">
  <!-- ─── SIDEBAR ─── -->
  <nav class="sidebar" id="sidebar">
    <div class="sidebar-header">
      <h1>금융상품 가이드</h1>
      <p>차의과학대학교 경영학전공</p>
    </div>

    <div class="sidebar-section">
      <div class="sidebar-section-title">카테고리</div>
      <div class="sidebar-item active" data-cat="deposit" onclick="selectCategory('deposit')">
        <span class="item-icon">&#128179;</span> 비금융투자(예금) <span class="item-count">5</span>
      </div>
      <div class="sidebar-item" data-cat="equity" onclick="selectCategory('equity')">
        <span class="item-icon">&#128200;</span> 지분증권 <span class="item-count">4</span>
      </div>
      <div class="sidebar-item" data-cat="debt" onclick="selectCategory('debt')">
        <span class="item-icon">&#128196;</span> 채무증권 <span class="item-count">18</span>
      </div>
      <div class="sidebar-item" data-cat="fund" onclick="selectCategory('fund')">
        <span class="item-icon">&#128188;</span> 수익증권 <span class="item-count">7</span>
      </div>
      <div class="sidebar-item" data-cat="derivative_s" onclick="selectCategory('derivative_s')">
        <span class="item-icon">&#128209;</span> 파생결합증권 <span class="item-count">4</span>
      </div>
      <div class="sidebar-item" data-cat="derivative" onclick="selectCategory('derivative')">
        <span class="item-icon">&#128202;</span> 파생상품 <span class="item-count">2</span>
      </div>
      <div class="sidebar-item" data-cat="alternative" onclick="selectCategory('alternative')">
        <span class="item-icon">&#129351;</span> 대체투자 <span class="item-count">2</span>
      </div>
      <div class="sidebar-item" data-cat="trust" onclick="selectCategory('trust')">
        <span class="item-icon">&#128274;</span> 신탁 <span class="item-count">3</span>
      </div>
      <div class="sidebar-item" data-cat="loan" onclick="selectCategory('loan')">
        <span class="item-icon">&#128176;</span> 여신 <span class="item-count">4</span>
      </div>
      <div class="sidebar-item" data-cat="asset_mgmt" onclick="selectCategory('asset_mgmt')">
        <span class="item-icon">&#128221;</span> 자산관리 <span class="item-count">4</span>
      </div>
      <div class="sidebar-item" data-cat="insurance" onclick="selectCategory('insurance')">
        <span class="item-icon">&#128737;</span> 보험 <span class="item-count">2</span>
      </div>
    </div>

    <div class="sidebar-footer">
      <div class="sidebar-section-title">AI 상담 모드</div>
      <div class="mode-tabs">
        <div class="mode-tab active" data-mode="ttt" onclick="switchMode('ttt')">
          <span class="mode-tab-icon">&#128172;</span>TTT
        </div>
        <div class="mode-tab" data-mode="sts" onclick="switchMode('sts')">
          <span class="mode-tab-icon">&#127908;</span>STS
        </div>
        <div class="mode-tab" data-mode="ftf" onclick="switchMode('ftf')">
          <span class="mode-tab-icon">&#128100;</span>FTF
        </div>
      </div>
    </div>
  </nav>

  <!-- ─── MAIN CONTENT ─── -->
  <main class="main" id="mainContent">
    <!-- Dynamically rendered -->
  </main>

  <!-- ─── CHAT PANEL (TTT) ─── -->
  <aside class="chat-panel" id="chatPanel">
    <!-- TTT: Text chat -->
    <div id="tttContainer" style="display:flex;flex-direction:column;flex:1">
      <div class="chat-header">
        <h3>AI 금융상품 상담</h3>
        <div class="chat-status"><span class="dot online"></span> 온라인</div>
      </div>
      <div class="chat-messages" id="chatMessages">
        <div class="msg bot">안녕하세요! 금융상품에 대해 궁금한 점을 물어보세요.</div>
      </div>
      <div class="chat-input-area">
        <div class="chat-input-wrap">
          <textarea class="chat-input" id="chatInput" rows="1" placeholder="메시지를 입력하세요..." onkeydown="handleChatKey(event)"></textarea>
          <button class="chat-send" id="chatSend" onclick="sendChat()">전송</button>
        </div>
      </div>
    </div>

    <!-- STS: Voice -->
    <div class="sts-container" id="stsContainer">
      <div class="chat-header" style="width:100%;padding:16px 20px;border-bottom:1px solid var(--border)">
        <h3>음성 대화 (STS)</h3>
        <div class="chat-status" id="stsConnectionStatus"><span class="dot"></span> 대기</div>
      </div>
      <div style="flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:24px">
        <div class="sts-visualizer" id="stsVisualizer">&#127908;</div>
        <div class="sts-status" id="stsStatus">시작 버튼을 눌러 음성 대화를 시작하세요</div>
        <div class="sts-transcript" id="stsTranscript"></div>
        <button class="sts-btn" id="stsStartBtn" onclick="toggleSTS()">음성 대화 시작</button>
      </div>
      <div id="stsAudioContainer" style="display:none"></div>
    </div>

    <!-- FTF: Avatar (교수님 코드 그대로) -->
    <div class="ftf-container" id="ftfContainer">
      <div class="chat-header" style="border-bottom:1px solid var(--border)">
        <h3>아바타 대화 (FTF)</h3>
        <div class="chat-status" id="ftfStatus"><span class="dot"></span> 대기</div>
      </div>
      <div class="ftf-video-wrap" id="ftfVideoWrap">
        <video id="ftfMediaElement" autoplay playsinline style="width:100%;height:100%;object-fit:cover;display:none"></video>
        <div class="ftf-placeholder" id="ftfPlaceholder">
          <div class="icon">&#128100;</div>
          <div>아바타 세션을 시작하세요</div>
        </div>
      </div>
      <div class="ftf-status" id="ftfStateLabel">대기 중</div>
      <div class="ftf-controls">
        <button class="sts-btn" id="ftfStartBtn" onclick="toggleFTF()">아바타 시작</button>
      </div>
    </div>
  </aside>
</div>

<!-- Mobile chat toggle -->
<button class="chat-toggle-btn" id="chatToggle" onclick="toggleChatPanel()">&#128172;</button>

<script>
// ═══════════════════════════════════════════
// DATA
// ═══════════════════════════════════════════
const CATEGORIES = {
  deposit:     { name: '비금융투자(예금)', icon: '&#128179;', products: [
    { num:'01', name:'당좌예금' }, { num:'02', name:'보통예금' }, { num:'03', name:'정기예금', representative:true },
    { num:'04', name:'정기적금' }, { num:'05', name:'주택청약저축' }
  ]},
  equity:      { name: '지분증권', icon: '&#128200;', products: [
    { num:'06', name:'주식', representative:true }, { num:'07', name:'우선주' },
    { num:'08', name:'해외주식' }, { num:'09', name:'공매도' }
  ]},
  debt:        { name: '채무증권', icon: '&#128196;', products: [
    { num:'10', name:'콜' }, { num:'11', name:'재정증권' }, { num:'12', name:'국고채', representative:true },
    { num:'13', name:'통화안정증권' }, { num:'14', name:'상업어음' }, { num:'15', name:'기업어음' },
    { num:'16', name:'CD' }, { num:'17', name:'MMDA' }, { num:'18', name:'은행인수어음' },
    { num:'19', name:'RP' }, { num:'20', name:'발행어음' }, { num:'21', name:'회사채' },
    { num:'22', name:'전환사채' }, { num:'23', name:'신주인수권부사채' }, { num:'24', name:'교환사채' },
    { num:'25', name:'ABS' }, { num:'26', name:'MBS' }, { num:'27', name:'CDO' }

function selectCategory(catId) {
  currentCategory = catId;
  currentProduct = null;

  // Update sidebar
  document.querySelectorAll('.sidebar-item').forEach(el => {
    el.classList.toggle('active', el.dataset.cat === catId);
  });

  renderContent();

  // Mobile: close sidebar
  if (window.innerWidth <= 768) toggleSidebar();
}

function selectProduct(productName) {
  currentProduct = productName;
  renderContent();
}

function switchMode(mode) {
  // Cleanup previous mode
  if (currentMode === 'sts' && stsActive) stopSTS();
  if (currentMode === 'ftf' && ftfSessionInfo) stopFTF();

  currentMode = mode;

  // Update tabs
  document.querySelectorAll('.mode-tab').forEach(el => {
    el.classList.toggle('active', el.dataset.mode === mode);
  });

  // Show/hide containers
  document.getElementById('tttContainer').style.display = mode === 'ttt' ? 'flex' : 'none';
  document.getElementById('stsContainer').style.display = mode === 'sts' ? 'flex' : 'none';
  document.getElementById('ftfContainer').style.display = mode === 'ftf' ? 'flex' : 'none';

  // Ensure chat panel is visible on desktop
  if (window.innerWidth > 1024) {
    document.getElementById('chatPanel').style.display = 'flex';
  }
}

// TTT MODE — Text Chat
// ═══════════════════════════════════════════
function handleChatKey(e) {
  if (e.key === 'Enter' && !e.shiftKey) {
    e.preventDefault();
    sendChat();
  }
}

async function sendChat() {
  const input = document.getElementById('chatInput');
  const msg = input.value.trim();
  if (!msg || isSending) return;

  isSending = true;
  input.value = '';
  document.getElementById('chatSend').disabled = true;

  appendMessage('user', msg);
  const typingEl = appendMessage('bot', '<div class="typing-dots"><span></span><span></span><span></span></div>');

  chatHistory.push({ role: 'user', content: msg });

  try {
    const res = await fetch('/api/openai-chat', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ message: msg, history: chatHistory.slice(-10) })
    });
    const data = await res.json();

    typingEl.innerHTML = data.reply || data.error || '응답을 받지 못했어요.';
    chatHistory.push({ role: 'assistant', content: data.reply || '' });

    // Navigate to category if needed
    if (data.action === 'navigate' && data.categoryId && CATEGORIES[data.categoryId]) {
      selectCategory(data.categoryId);
    }
  } catch (err) {
    typingEl.innerHTML = '네트워크 오류가 발생했어요. 다시 시도해 주세요.';
  }

  isSending = false;
  document.getElementById('chatSend').disabled = false;
  scrollChat();
}

function appendMessage(role, html) {
  const container = document.getElementById('chatMessages');
  const el = document.createElement('div');
  el.className = `msg ${role}`;
  el.innerHTML = html;
  container.appendChild(el);
  scrollChat();
  return el;
}

function scrollChat() {
  const c = document.getElementById('chatMessages');
  c.scrollTop = c.scrollHeight;
}

// ═══════════════════════════════════════════
// STS MODE — OpenAI Realtime WebRTC
// ═══════════════════════════════════════════
async function toggleSTS() {
  if (stsActive) {
    stopSTS();
  } else {
    await startSTS();
  }
}

async function startSTS() {
  const btn = document.getElementById('stsStartBtn');
  const statusEl = document.getElementById('stsStatus');
  const connStatus = document.getElementById('stsConnectionStatus');

  btn.textContent = '연결 중...';
  btn.disabled = true;
  statusEl.textContent = '서버에 연결하고 있어요...';

  try {
    // 1. Get ephemeral token
    const tokenRes = await fetch('/api/realtime-token', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({})
    });
    const tokenData = await tokenRes.json();

    if (!tokenData.client_secret) {
      throw new Error(tokenData.error || 'Token 발급 실패');
    }

    // 2. Create peer connection
    const pc = new RTCPeerConnection();
    stsPeerConnection = pc;

    // 3. Handle remote audio
    const audioEl = document.createElement('audio');
    audioEl.autoplay = true;
    document.getElementById('stsAudioContainer').appendChild(audioEl);

    pc.ontrack = (e) => {
      audioEl.srcObject = e.streams[0];
      updateSTSVisual('speaking');
    };

    // 4. Add local microphone
    const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
    pc.addTrack(stream.getTracks()[0], stream);

    // 5. Data channel for events
    const dc = pc.createDataChannel('oai-events');
    stsDataChannel = dc;

    dc.onmessage = (e) => {
      try {
        const event = JSON.parse(e.data);
        handleSTSEvent(event);
      } catch {}
    };

    // 6. Create offer and set local description
    const offer = await pc.createOffer();
    await pc.setLocalDescription(offer);

    // 7. Send offer to OpenAI
    const sdpRes = await fetch(`https://api.openai.com/v1/realtime?model=gpt-4o-realtime-preview`, {
      method: 'POST',
      headers: {
        'Authorization': `Bearer ${tokenData.client_secret.value}`,
        'Content-Type': 'application/sdp'
      },
      body: offer.sdp
    });
    const answerSdp = await sdpRes.text();
    await pc.setRemoteDescription({ type: 'answer', sdp: answerSdp });

    stsActive = true;
    btn.textContent = '대화 종료';
    btn.disabled = false;
    btn.classList.add('stop');
    statusEl.textContent = '듣고 있어요...';
    connStatus.innerHTML = '<span class="dot online"></span> 연결됨';
    updateSTSVisual('listening');

  } catch (err) {
    console.error('STS start error:', err);
    statusEl.textContent = '연결에 실패했어요: ' + err.message;
    btn.textContent = '음성 대화 시작';
    btn.disabled = false;
  }
}

function handleSTSEvent(event) {
  const statusEl = document.getElementById('stsStatus');
  const transcriptEl = document.getElementById('stsTranscript');

  switch (event.type) {
    case 'input_audio_buffer.speech_started':
      statusEl.textContent = '듣고 있어요...';
      updateSTSVisual('listening');
      break;
    case 'input_audio_buffer.speech_stopped':
      statusEl.textContent = '생각하고 있어요...';
      updateSTSVisual('');
      break;
    case 'response.audio.started':
    case 'response.created':
      statusEl.textContent = '답변하고 있어요...';
      updateSTSVisual('speaking');
      break;
    case 'response.audio.done':
    case 'response.done':
      statusEl.textContent = '듣고 있어요...';
      updateSTSVisual('listening');
      break;
    case 'conversation.item.input_audio_transcription.completed':
      if (event.transcript) {
        transcriptEl.textContent = '나: ' + event.transcript;
      }
      break;
    case 'response.audio_transcript.done':
      if (event.transcript) {
        transcriptEl.textContent = 'AI: ' + event.transcript;
      }
      break;
  }
}

function updateSTSVisual(state) {
  const v = document.getElementById('stsVisualizer');
  v.classList.remove('listening', 'speaking');
  if (state) v.classList.add(state);
}

function stopSTS() {
  if (stsPeerConnection) {
    stsPeerConnection.getSenders().forEach(s => {
      if (s.track) s.track.stop();
    });
    stsPeerConnection.close();
    stsPeerConnection = null;
  }
  stsDataChannel = null;
  stsActive = false;

  document.getElementById('stsAudioContainer').innerHTML = '';
  document.getElementById('stsStartBtn').textContent = '음성 대화 시작';
  document.getElementById('stsStartBtn').classList.remove('stop');
  document.getElementById('stsStatus').textContent = '시작 버튼을 눌러 음성 대화를 시작하세요';
  document.getElementById('stsConnectionStatus').innerHTML = '<span class="dot"></span> 대기';
  updateSTSVisual('');
}

async function ftfCallProxy(endpoint, payload) {
  const res = await fetch('/api/heygen-proxy', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ endpoint, token: ftfSessionToken, payload })
  });
  if (!res.ok) throw new Error(`Proxy ${res.status}`);
  return res.json();
}

function setFTFState(state) {
  const label = document.getElementById('ftfStateLabel');
  const labels = { idle: '대기 중', listening: '듣고 있어요...', thinking: '생각하고 있어요...', speaking: '답변하고 있어요...' };
  label.textContent = labels[state] || state;
}

function ftfInitSpeechRecognition() {
  const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
  if (!SR) return false;

  ftfRecognition = new SR();
  ftfRecognition.lang = 'ko-KR';
  ftfRecognition.interimResults = true;
  ftfRecognition.continuous = true;
  ftfRecognition.maxAlternatives = 1;

  ftfRecognition.onstart = () => {
    ftfIsListening = true;
    setFTFState('listening');
  };

  ftfRecognition.onresult = (event) => {
    clearTimeout(ftfSilenceTimer);
    let interim = '';
    let final = '';

    for (let i = event.resultIndex; i < event.results.length; i++) {
      const t = event.results[i][0].transcript;
      if (event.results[i].isFinal) {
        final += t;
      } else {
        interim += t;
      }
    }

    if (final.trim()) {
      ftfStopListening();
      ftfProcessInput(final.trim());
    } else if (interim) {
      // 중간 결과 후 2초 무음이면 전송
      ftfSilenceTimer = setTimeout(() => {
        const text = interim.trim();
        if (text && text.length > 1) {
          ftfStopListening();
          ftfProcessInput(text);
        }
      }, 2000);
    }
  };

  ftfRecognition.onerror = (event) => {
    if (event.error === 'not-allowed') {
      alert('마이크 권한이 필요합니다.\n브라우저 주소창 왼쪽의 자물쇠 아이콘을 클릭하여 마이크를 허용해 주세요.');
      ftfAutoListen = false;
    } else if (event.error === 'no-speech') {
      if (ftfAutoListen && ftfSessionInfo && !ftfIsProcessing && !ftfIsSpeaking) {
        setTimeout(ftfStartListening, 500);
      }
    }
    ftfIsListening = false;
  };

  ftfRecognition.onend = () => {
    ftfIsListening = false;
    if (ftfAutoListen && ftfSessionInfo && !ftfIsProcessing && !ftfIsSpeaking) {
      setTimeout(ftfStartListening, 600);
    }
  };

  return true;
}

function ftfStartListening() {
  if (!ftfRecognition || ftfIsListening || ftfIsProcessing || ftfIsSpeaking || !ftfSessionInfo) return;
  try { ftfRecognition.start(); } catch (e) {}
}

function ftfStopListening() {
  clearTimeout(ftfSilenceTimer);
  ftfIsListening = false;
  if (ftfRecognition) {
    try { ftfRecognition.stop(); } catch (e) {}
  }
}

async function ftfProcessInput(text) {
  if (!text || !ftfSessionInfo || ftfIsProcessing) return;
  ftfIsProcessing = true;

  setFTFState('thinking');

  try {
    const res = await fetch('/api/openai-chat', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ message: text, history: chatHistory.slice(-10) })
    });
    const data = await res.json();

    chatHistory.push({ role: 'user', content: text });
    chatHistory.push({ role: 'assistant', content: data.reply || '' });

    if (data.action === 'navigate' && data.categoryId) {
      selectCategory(data.categoryId);
    }

    // 아바타가 답변 (교수님 코드: callProxy → streaming.task)
    ftfIsSpeaking = true;
    setFTFState('speaking');

    const ttsText = data.ttsReply || data.reply || '';
    await ftfCallProxy('/v1/streaming.task', {
      session_id: ftfSessionInfo.session_id,
      text: ttsText,
      task_type: 'repeat'
    });

    // 한국어 평균 5자/초 기준 대기 (교수님 코드 그대로)
    const speakDuration = Math.max(3000, (ttsText.length / 5) * 1000 + 1500);
    setTimeout(() => {
      ftfIsSpeaking = false;
      ftfIsProcessing = false;
      if (ftfAutoListen && ftfSessionInfo) {
        ftfStartListening();
      } else {
        setFTFState('idle');
      }
    }, speakDuration);

  } catch (err) {
    console.error('FTF chat error:', err);
    ftfIsProcessing = false;
    ftfIsSpeaking = false;
    setFTFState('listening');
    if (ftfAutoListen && ftfSessionInfo) ftfStartListening();
  }
}

async function toggleFTF() {
  if (ftfSessionInfo) {
    stopFTF();
  } else {
    await startFTF();
  }
}

async function startFTF() {
  const btn = document.getElementById('ftfStartBtn');
  const statusLabel = document.getElementById('ftfStateLabel');
  const statusDot = document.querySelector('#ftfStatus .dot');
  const mediaEl = document.getElementById('ftfMediaElement');
  const placeholder = document.getElementById('ftfPlaceholder');

  btn.textContent = '연결 중...';
  btn.disabled = true;
  statusLabel.textContent = '아바타 세션을 시작하는 중...';

  try {
    // 1. 토큰 발급
    const tokenRes = await fetch('/api/heygen-token', { method: 'POST' });
    const tokenData = await tokenRes.json();
    ftfSessionToken = tokenData.token || tokenData.data?.token;
    if (!ftfSessionToken) throw new Error('HeyGen token 발급 실패');

    // 2. 세션 생성 (교수님 코드: callProxy → streaming.new)
    const createRes = await ftfCallProxy('/v1/streaming.new', {
      avatar_id: AVATAR_CONFIG.avatarId,
      quality: 'medium',
      voice: { voice_id: AVATAR_CONFIG.voiceId, rate: 1.0, emotion: 'friendly' },
      language: 'ko',
      version: 'v2',
      video_encoding: 'H264'
    });

    if (!createRes.data) throw new Error('세션 생성 실패');
    ftfSessionInfo = createRes.data;

    // 3. LiveKit 연결 (교수님 코드 그대로)
    const lk = window.LivekitClient;
    ftfRoom = new lk.Room({ adaptiveStream: true, dynacast: true });

    ftfRoom.on(lk.RoomEvent.TrackSubscribed, (track) => {
      if (track.kind === 'video' || track.kind === 'audio') {
        track.attach(mediaEl);
        mediaEl.style.display = 'block';
        placeholder.style.display = 'none';
      }
    });

    await ftfRoom.connect(ftfSessionInfo.url, ftfSessionInfo.access_token);

    // 4. 스트리밍 시작
    await ftfCallProxy('/v1/streaming.start', {
      session_id: ftfSessionInfo.session_id
    });

    // 5. UI 업데이트
    chatHistory = [];
    btn.textContent = '아바타 종료';
    btn.disabled = false;
    btn.classList.add('stop');
    statusDot.classList.add('online');

    // 6. 인사 메시지 (교수님 코드 패턴)
    const greetingDisplay = '안녕하세요! 금융상품에 대해 궁금한 점을 편하게 물어보세요.';
    const greetingTTS = '안녕하세요! 금융 상품에 대해 궁금한 점을 편하게 물어보세요.';
    ftfIsSpeaking = true;
    setFTFState('speaking');

    await ftfCallProxy('/v1/streaming.task', {
      session_id: ftfSessionInfo.session_id,
      text: greetingTTS,
      task_type: 'repeat'
    });

    // 인사 끝난 후 자동 듣기 시작 (교수님 코드: speakDuration 계산)
    const greetDuration = Math.max(3000, (greetingTTS.length / 5) * 1000 + 1500);
    setTimeout(() => {
      ftfIsSpeaking = false;
      ftfIsProcessing = false;
      ftfAutoListen = true;
      const ok = ftfInitSpeechRecognition();
      if (ok) {
        ftfStartListening();
      } else {
        setFTFState('idle');
      }
    }, greetDuration);

  } catch (err) {
    console.error('FTF start error:', err);
    statusLabel.textContent = '연결 실패: ' + err.message;
    btn.textContent = '아바타 시작';
    btn.disabled = false;
  }
}

async function stopFTF() {
  ftfAutoListen = false;
  ftfStopListening();

  if (ftfSessionInfo) {
    try {
      await ftfCallProxy('/v1/streaming.stop', {
        session_id: ftfSessionInfo.session_id
      });
    } catch (e) {}
  }

  if (ftfRoom) {
    await ftfRoom.disconnect();
    ftfRoom = null;
  }

  const mediaEl = document.getElementById('ftfMediaElement');
  mediaEl.srcObject = null;
  mediaEl.style.display = 'none';
  document.getElementById('ftfPlaceholder').style.display = 'flex';

  ftfSessionInfo = null;
  ftfSessionToken = null;
  ftfRecognition = null;
  ftfIsProcessing = false;
  ftfIsSpeaking = false;
  ftfIsListening = false;

  document.getElementById('ftfStartBtn').textContent = '아바타 시작';
  document.getElementById('ftfStartBtn').classList.remove('stop');
  document.getElementById('ftfStartBtn').disabled = false;
  document.getElementById('ftfStateLabel').textContent = '대기 중';
  document.querySelector('#ftfStatus .dot').classList.remove('online');
}
